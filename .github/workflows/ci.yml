name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Syntax check
        run: |
          python -m py_compile onenote_pro_mcp_ps.py tests/test_smoke.py

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  python-test:
    name: Python smoke tests
    runs-on: windows-latest
    needs: [python-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run smoke tests
        run: |
          pytest -q tests

  powershell-lint:
    name: PowerShell Lint (PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Analyse onenote_bridge.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path onenote_bridge.ps1 -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no errors found."
